<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: appHeader(${title})}"></div>
<main class="container">
	<section class="section-heading">
		<h1>내 강의</h1>
		<p>신청 완료된 강의를 확인합니다.</p>
	</section>

	<section class="enrolled-list">
		<article class="enrolled-item" th:each="course : ${courses}">
			<div class="small-thumb"></div>
			<div>
				<h2 th:text="${course.title}">서비스 기획 MVP</h2>
				<p><span th:text="${course.instructor}">강사명</span> · 신청됨</p>
			</div>
			<a class="btn primary" th:href="@{/courses/{id}(id=${course.id})}">상세 보기</a>
		</article>
	</section>
</main>
</body>
</html>
