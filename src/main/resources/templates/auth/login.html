<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<main class="auth-page">
	<h1 class="page-label standalone">로그인</h1>
	<section class="auth-card">
		<h2>LXP 로그인</h2>
		<form th:action="@{/login}" method="post" class="form-stack">
			<label>이메일<input type="email" name="email" value="name@example.com"></label>
			<label>비밀번호<input type="password" name="password" placeholder="비밀번호 입력"></label>
			<button class="btn primary" type="submit">로그인</button>
		</form>
		<p class="helper">계정이 없나요? <a th:href="@{/signup}">회원가입</a></p>
	</section>
</main>
</body>
</html>
